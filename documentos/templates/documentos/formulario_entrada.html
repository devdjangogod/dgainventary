<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<div class="container py-5">
    <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-primary text-white py-3 rounded-top-4">
            <h4 class="mb-0">📥 {{ titulo }}</h4>
        </div>

        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Número de expediente</label>
                        {{ form.numero_expediente }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Registro principal</label>
                        {{ form.numero_registro_principal }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Registro adjunto</label>
                        {{ form.numero_registro_adjunto }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Autor</label>
                        {{ form.autor }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo de documento</label>
                        {{ form.tipo_documento }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Número de documento</label>
                        {{ form.numero_documento }}
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label">Asunto</label>
                        {{ form.asunto }}
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                        ← Volver
                    </a>

                    <button type="submit" class="btn btn-success">
                        Guardar entrada
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('input, select, textarea').forEach(function(element){
    element.classList.add('form-control');
});
</script>

</body>
</html>
