<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema INV DGA{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: #0f172a;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar .brand {
            color: white;
            font-size: 22px;
            font-weight: 700;
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 14px 24px;
            font-size: 15px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #1e293b;
            color: white;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }

        .card-stat,
        .table-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(15,23,42,.08);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                min-height: auto;
            }

            .content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="brand">
        <i class="bi bi-folder2-open"></i> SystemINVUNT
    </div>

    <a href="{% url 'dashboard' %}" class="{% block active_dashboard %}{% endblock %}">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>

    <a href="{% url 'registros_inventario' %}" class="{% block active_registros %}{% endblock %}">
        <i class="bi bi-search me-2"></i> Registros de Inventario
    </a>

    <!-- <a href="{% url 'reportes' %}" class="{% block active_reportes %}{% endblock %}">
        <i class="bi bi-bar-chart me-2"></i> Reportes
    </a> -->

    <!-- <a href="{% url 'configuracion' %}" class="{% block active_configuracion %}{% endblock %}">
        <i class="bi bi-gear me-2"></i> Configuración
    </a> -->
</div>

<main class="content">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
